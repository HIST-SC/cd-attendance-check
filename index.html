<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>출근 체크 (지도 확장 버전)</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <style>
    body {
      font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      background-color: #F2F2F7;
      -webkit-tap-highlight-color: transparent;
    }
    /* [수정] 지도 높이를 240px -> 340px로 키우고 둥근 모서리 최적화 */
    #map {
      height: 340px;
      width: 100%;
      border-radius: 24px;
      margin-top: 0.25rem;
      border: 1px solid rgba(0,0,0,0.04);
      z-index: 1;
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 antialiased">

  <main class="w-full max-w-md bg-white/70 backdrop-blur-xl border border-white/40 rounded-[32px] shadow-[0_12px_40px_0_rgba(0,0,0,0.06)] p-6 transition-all duration-500">
    
    <header class="text-center mt-1 mb-4">
      <h1 class="text-2xl font-bold text-gray-900 tracking-tight">출근 체크인</h1>
      <p class="text-xs text-gray-500 mt-0.5">실시간으로 내 위치를 동기화 중입니다.</p>
    </header>

    <div id="form-section" class="space-y-5">
      
      <div class="relative">
        <div id="map"></div>
        <div class="absolute bottom-4 left-4 z-[10] bg-black/65 backdrop-blur-md px-3 py-1.5 rounded-xl text-[11px] font-mono text-white/95 shadow-sm">
          📍 현재: <span id="current-coords">위치 파악 중...</span>
        </div>
      </div>
      
      <div class="space-y-1.5">
        <label for="username" class="text-xs font-semibold text-gray-400 uppercase tracking-wider pl-1">이름</label>
        <input 
          type="text" 
          id="username" 
          placeholder="이름을 입력하세요" 
          class="w-full px-4 py-3.5 bg-gray-100/60 border border-transparent rounded-2xl focus:outline-none focus:bg-white focus:border-[#007AFF] focus:ring-4 focus:ring-[#007AFF]/10 text-gray-900 transition-all duration-200 placeholder-gray-400 font-medium"
        >
      </div>

      <button 
        id="check-btn" 
        onclick="handleAttendance()"
        class="w-full py-4 bg-[#007AFF] text-white font-semibold rounded-2xl shadow-lg shadow-[#007AFF]/20 active:scale-[0.98] active:bg-[#0066CC] transition-all duration-200 flex items-center justify-center"
      >
        <span>출근하기</span>
      </button>
    </div>

    <div id="loading-section" class="hidden flex flex-col items-center justify-center py-16 space-y-4">
      <div class="w-8 h-8 border-4 border-[#007AFF]/20 border-t-[#007AFF] rounded-full animate-spin"></div>
      <p id="loading-text" class="text-sm font-medium text-gray-500">구글 시트에 기록하는 중...</p>
    </div>

    <div id="result-section" class="hidden flex flex-col items-center justify-center py-10 text-center">
      <div id="result-icon" class="mb-4"></div>
      <h2 id="result-title" class="text-xl font-bold text-gray-900"></h2>
      <p id="result-message" class="text-sm text-gray-500 mt-2 max-w-xs whitespace-pre-line"></p>
      <button 
        onclick="resetUI()" 
        class="mt-6 px-5 py-2 bg-gray-100 text-gray-600 font-medium text-sm rounded-xl hover:bg-gray-200 active:scale-95 transition-all"
      >
        다시 시도
      </button>
    </div>

  </main>

  <script>
    const COMPANY_LAT = 37.5628878;
    const COMPANY_LNG = 126.9812199;
    const ALLOWED_DISTANCE = 80;   // 반경 거리(m)
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzXzLbuVQKJwPXJu3IzsppxGdjrD--wuJyBSPP94FyoNLwCuCJ37MBP9irWOGGeqIS31w/exec"; 

    let map;
    let userMarker;
    let watchId = null;
    
    let currentLat = 0;
    let currentLng = 0;

    window.onload = function() {
      initMap();
      startTracking();
    };

    function initMap() {
      map = L.map('map', {
        zoomControl: false,
        dragging: !L.Browser.mobile,
        touchZoom: 'center',
        doubleClickZoom: false,
        scrollWheelZoom: false
      }).setView([COMPANY_LAT, COMPANY_LNG], 17);

      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap'
      }).addTo(map);

      L.marker([COMPANY_LAT, COMPANY_LNG]).addTo(map);

      L.circle([COMPANY_LAT, COMPANY_LNG], {
        color: '#007AFF',
        fillColor: '#007AFF',
        fillOpacity: 0.12,
        radius: ALLOWED_DISTANCE
      }).addTo(map);
    }

    function startTracking() {
      if (!navigator.geolocation) {
        document.getElementById('current-coords').innerText = "GPS 미지원";
        return;
      }

      if (watchId !== null) navigator.geolocation.clearWatch(watchId);

      watchId = navigator.geolocation.watchPosition(
        (position) => {
          currentLat = position.coords.latitude;
          currentLng = position.coords.longitude;

          document.getElementById('current-coords').innerText = `${currentLat.toFixed(5)}, ${currentLng.toFixed(5)}`;

          if (userMarker) {
            userMarker.setLatLng([currentLat, currentLng]);
          } else {
            userMarker = L.circleMarker([currentLat, currentLng], {
              radius: 7,
              color: 'white',
              fillColor: '#007AFF',
              fillOpacity: 1,
              weight: 2
            }).addTo(map);
          }

          const group = new L.featureGroup([L.marker([COMPANY_LAT, COMPANY_LNG]), userMarker]);
          map.fitBounds(group.getBounds().pad(0.3));
        },
        (error) => {
          document.getElementById('current-coords').innerText = "위치 수집 중지됨";
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }

    function getDistance(lat1, lon1, lat2, lon2) {
      const R = 6371e3;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    async function handleAttendance() {
      const nameInput = document.getElementById('username');
      const name = nameInput.value.trim();

      if (!name) {
        alert("이름을 입력해 주세요.");
        nameInput.focus();
        return;
      }

      if (currentLat === 0 || currentLng === 0) {
        alert("위치 좌표를 수집 중입니다. 잠시만 기다려 주세요.");
        return;
      }

      switchUI('loading');

      const distance = getDistance(currentLat, currentLng, COMPANY_LAT, COMPANY_LNG);
      
      if (distance <= ALLOWED_DISTANCE) {
        await sendToGoogleSheets(name, currentLat, currentLng);
      } else {
        showResult(
          false, 
          "위치 인증 실패", 
          `회사와 너무 멉니다.\n(허용: ${ALLOWED_DISTANCE}m / 현재: ${Math.round(distance)}m)\n\n바운더리 원 안으로 이동해 주세요.`
        );
      }
    }

    async function sendToGoogleSheets(name, lat, lng) {
      try {
        const formData = new URLSearchParams();
        formData.append('name', name);
        formData.append('latitude', lat);
        formData.append('longitude', lng);

        const response = await fetch(GAS_URL, {
          method: 'POST',
          mode: 'cors', 
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
          },
          body: formData.toString()
        });

        const resText = await response.text();
        
        try {
          const resJson = JSON.parse(resText);
          if (resJson.success) {
            showResult(true, "출근 완료!", `오늘도 좋은 하루 되세요,\n${name}님!`);
          } else {
            showResult(false, "기록 실패", resJson.message || "서버에서 거부되었습니다.");
          }
        } catch(e) {
          if(response.ok) {
            showResult(true, "출근 완료!", `${name}님, 정상 등록되었습니다.`);
          } else {
            showResult(false, "서버 오류", "구글 스크립트 에러가 발생했습니다.");
          }
        }
      } catch (error) {
        showResult(false, "통신 오류", "구글 서버와 통신할 수 없습니다.");
      }
    }

    function switchUI(state) {
      document.getElementById('form-section').classList.add('hidden');
      document.getElementById('loading-section').classList.add('hidden');
      document.getElementById('result-section').classList.add('hidden');

      if (state === 'form') document.getElementById('form-section').classList.remove('hidden');
      else if (state === 'loading') document.getElementById('loading-section').classList.remove('hidden');
      else if (state === 'result') document.getElementById('result-section').classList.remove('hidden');
    }

    function showResult(isSuccess, title, message) {
      switchUI('result');
      const iconDiv = document.getElementById('result-icon');
      document.getElementById('result-title').innerText = title;
      document.getElementById('result-message').innerText = message;

      if (isSuccess) {
        iconDiv.innerHTML = `<div class="w-16 h-16 rounded-full bg-emerald-100 text-emerald-500 flex items-center justify-center"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-8 h-8"><path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" /></svg></div>`;
      } else {
        iconDiv.innerHTML = `<div class="w-16 h-16 rounded-full bg-rose-100 text-rose-500 flex items-center justify-center"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-8 h-8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" /></svg></div>`;
      }
    }

    function resetUI() {
      switchUI('form');
      startTracking();
    }
  </script>
</body>
</html>
